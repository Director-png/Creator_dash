<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOID OS</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background-color: #000; }
        .container { position: relative; width: 100vw; height: 100vh; overflow: hidden; }
        iframe { 
            position: absolute;
            top: -50px; /* Hide the Streamlit bar */
            left: 0;
            width: 100%; 
            height: calc(100% + 50px); 
            border: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <iframe src="https://void-os.streamlit.app/?embed=true"></iframe>
    </div>
</body>
</html>
