<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOID OS | Private Terminal</title>
    <style>
        body, html { 
            margin: 0; padding: 0; 
            height: 100%; width: 100%;
            overflow: hidden; background-color: #000; 
        }
        
        .container {
            position: relative;
            width: 100%;
            height: 100vh;
            overflow: hidden;
        }

        /* DEFAULT MOBILE STYLE (No Scaling) */
        iframe { 
            position: absolute;
            top: -50px; 
            left: 0;
            width: 100%; 
            height: calc(100% + 100px); 
            border: none;
        }

        /* 🖥️ DESKTOP-ONLY FIX (For Laptops & Monitors) */
        @media (min-width: 1024px) {
            iframe { 
                /* We "stretch" the iframe to 125% width to force Streamlit into Desktop Mode */
                width: 125%; 
                height: calc(125% + 100px); 
                /* We scale it back down to 0.8 to fit the laptop screen exactly */
                transform: scale(0.8); 
                transform-origin: top left;
                /* Optional: Slight shift to center if needed, but top-left is usually safest */
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <iframe 
            src="https://void-os.streamlit.app/?embed=true" 
            allow="fullscreen; clipboard-read; clipboard-write">
        </iframe>
    </div>
</body>
</html>
