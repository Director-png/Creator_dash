<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VOID OS | Private Terminal</title>
    <style>
        body, html { 
            margin: 0; padding: 0; 
            height: 100%; width: 100%;
            overflow: hidden; background-color: #000; 
        }
        
        .container {
            position: relative;
            width: 100%;
            height: 100vh;
            overflow: hidden;
        }

        iframe { 
            position: absolute;
            /* Hide Streamlit Header & Footer */
            top: -50px; 
            left: 0;

            /* FORCE DESKTOP PROPORTIONS */
            /* We make the iframe much wider than the screen to force 'Desktop Mode' */
            width: 133.33%; 
            height: calc(133.33% + 100px); 
            
            border: none;

            /* SCALE BACK TO FIT SCREEN */
            /* 0.75 scale brings 133.33% back down to exactly 100% */
            transform: scale(0.75); 
            transform-origin: top left;

            /* Enhances text sharpness after downscaling */
            -webkit-font-smoothing: antialiased;
            image-rendering: -webkit-optimize-contrast;
        }
    </style>
</head>
<body>
    <div class="container">
        <iframe 
            src="https://void-os.streamlit.app/?embed=true" 
            allow="fullscreen; clipboard-read; clipboard-write">
        </iframe>
    </div>
</body>
</html>
