<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOID OS | Private Terminal</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background-color: #000; }
        .container { position: relative; width: 100vw; height: 100vh; overflow: hidden; background: #000; }

        iframe { 
            position: absolute;
            top: -50px; /* The crop to hide the Streamlit header bar */
            left: 0;
            width: 100%; 
            height: calc(100% + 100px); 
            border: none;
        }

        @media (min-width: 1024px) {
            iframe { 
                width: 111.11%; 
                height: calc(111.11% + 100px); 
                transform: scale(0.9); /* Slightly less aggressive than 0.85 for better visibility */
                transform-origin: top left;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <iframe src="https://void-os.streamlit.app/?embed=true" allow="fullscreen; clipboard-read; clipboard-write"></iframe>
    </div>
</body>
</html>
