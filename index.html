<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOID OS | Private Terminal</title>
    <style>
        body, html { 
            margin: 0; padding: 0; 
            height: 100%; width: 100%; 
            background-color: #000; 
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }
        .terminal-container {
            /* Full Screen View to prevent clipping */
            width: 100vw; 
            height: 100vh;
            background: #000;
            overflow: hidden;
            position: relative;
        }
        iframe {
            position: absolute;
            /* DO NOT CROP HERE. We will hide the header using Python CSS instead. */
            top: 0; 
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <div class="terminal-container">
        <iframe src="https://void-os.streamlit.app/?embed=true"></iframe>
    </div>
</body>
</html>
