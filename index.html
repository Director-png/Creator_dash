<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VOID OS | Private Terminal</title>
    <style>
        body, html { 
            margin: 0; padding: 0; 
            height: 100%; width: 100vw;
            overflow: hidden; background-color: #000; 
        }
        
        .container {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        /* 📱 MOBILE VIEW (1:1 Scale) */
        iframe { 
            position: absolute;
            top: -55px; 
            left: 0;
            width: 100%; 
            height: calc(100% + 110px); 
            border: none;
        }

        /* 🖥️ DESKTOP PRECISION (Laptops/Monitors) */
        @media (min-width: 1024px) {
            iframe { 
                /* Increase virtual resolution to 111% to trigger Desktop Mode */
                width: 111.11%; 
                height: calc(111.11% + 110px); 
                
                /* Scale back down to exactly 100% of the screen (1/1.11 = 0.9) */
                transform: scale(0.9); 
                transform-origin: top left;
                
                /* Hardware acceleration for crisp text */
                -webkit-font-smoothing: antialiased;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <iframe 
            src="https://void-os.streamlit.app/?embed=true" 
            allow="fullscreen; clipboard-read; clipboard-write">
        </iframe>
    </div>
</body>
</html>
