<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>VOID OS | Private Terminal</title>
    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            width: 100%;
            overflow: hidden; 
            background-color: #000; 
        }
        
        .container {
            position: relative;
            width: 100%;
            height: 100vh;
            overflow: hidden;
            background: #000;
        }

        iframe { 
            position: absolute;
            /* Hiding the Streamlit Header */
            top: -55px; 
            left: 0;
            
            /* We make the width 111% and then scale it down by 0.9 (0.9 * 1.11 ≈ 100%) */
            /* This effectively "zooms out" the UI to make it look sharp and small */
            width: 111.11%; 
            height: calc(111.11% + 100px); 
            
            border: none;
            
            /* The Magic Fix: Shrink the content to native desktop proportions */
            transform: scale(0.9); 
            transform-origin: 0 0;
            
            /* Smooth rendering */
            image-rendering: -webkit-optimize-contrast;
        }
    </style>
</head>
<body>
    <div class="container">
        <iframe 
            src="https://void-os.streamlit.app/?embed=true" 
            allow="fullscreen; clipboard-read; clipboard-write">
        </iframe>
    </div>
</body>
</html>
