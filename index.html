<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOID OS | Private Terminal</title>
    <style>
        body, html { 
            margin: 0; padding: 0; 
            height: 100%; width: 100%; 
            background-color: #000; 
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }
        .terminal-container {
            /* Precise 1cm/2cm framing */
            width: calc(100vw - 2cm); 
            height: calc(100vh - 4cm);
            background: #000;
            border: 1px solid rgba(0, 212, 255, 0.1);
            border-radius: 8px;
            overflow: hidden;
            position: relative;
        }
        iframe {
            position: absolute;
            top: -45px; /* Surgical crop of the Streamlit bar */
            left: 0;
            width: 100%;
            height: calc(100% + 45px);
            border: none;
        }
    </style>
</head>
<body>
    <div class="terminal-container">
        <iframe src="https://void-os.streamlit.app/?embed=true"></iframe>
    </div>
</body>
</html>
